<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Book</title>
</head>
<body>

<div id="peptopia-blue-book">
    <style>
        #peptopia-blue-book {
            /* Palette - Softened / Pastel Indigo Theme */
            --slate-50: #f8fafc; --slate-100: #f1f5f9; --slate-200: #e2e8f0;
            --slate-700: #334155; --slate-800: #1e293b; --slate-900: #0f172a;
            
            /* Theme Colors (Buttons & Headers) */
            --rose-500: #f43f5e; --rose-700: #be123c; 
            --blue-500: #06b6d4; --blue-700: #0e7490;
            --purple-500: #8b5cf6; --purple-700: #6d28d9;
            --emerald-500: #10b981; --emerald-700: #047857;
            
            /* Pale Backgrounds */
            --rose-50: #fff1f2; --blue-50: #ecfeff;
            --purple-50: #f5f3ff; --emerald-50: #ecfdf5;

            /* Alert Colors */
            --alert-bg: #fff7ed; --alert-border: #fdba74; --alert-text: #1e293b;
            
            /* General Elements */
            --accent-gold: #f59e0b; 
            --drug-blue: #2563eb; --key-purple: #7c3aed; 
            --bg-main: #eef2ff; /* Soft indigo instead of white */
            --bg-panel: #f8faff; /* Very soft tint for panels */
            
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--slate-900);
            line-height: 1.6;
            font-size: 16px;
            max-width: 64rem;
            margin: 0 auto;
            padding: 1rem;
            box-sizing: border-box;
            min-height: 100vh;
        }

        #peptopia-blue-book * { box-sizing: border-box; }

        /* Navbar Layout */
        #peptopia-blue-book .navbar {
            background-color: var(--slate-800); 
            color: var(--bg-panel); padding: 0.75rem 1rem;
            border-radius: 0.5rem; margin-bottom: 1.5rem; 
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            min-height: 80px; 
        }
        
        #peptopia-blue-book .nav-title { 
            font-weight: 800; font-size: 1.5rem; 
            display: flex; align-items: center; gap: 0.75rem; 
        }

        #peptopia-blue-book .nav-actions {
            display: flex; flex-direction: column; gap: 0.25rem; width: 140px; flex-shrink: 0; 
        }
        
        #peptopia-blue-book .action-btn {
            padding: 0.4rem 0.5rem; border-radius: 0.25rem; border: none; 
            cursor: pointer; font-weight: 600; font-size: 0.85rem; 
            transition: all 0.2s; width: 100%; text-align: center;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        #peptopia-blue-book .print-btn { background-color: var(--accent-gold); color: #fff; }
        #peptopia-blue-book .print-btn:hover { background-color: #d97706; }

        @media (max-width: 650px) {
            #peptopia-blue-book .navbar { flex-direction: column; gap: 1rem; text-align: center; }
            #peptopia-blue-book .nav-title { width: 100%; justify-content: center; margin-bottom: 0.5rem; }
            #peptopia-blue-book .nav-actions { margin: 0 auto; }
        }

        /* Tabs */
        #peptopia-blue-book .tabs-container { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; }
        #peptopia-blue-book .tab-btn {
            padding: 0.6rem 1rem; border-radius: 0.5rem; font-weight: 700; 
            color: #fff; border: none; flex-grow: 1; text-align: center;
            cursor: pointer; transition: all 0.2s; font-size: 0.95rem;
            filter: grayscale(40%) opacity(0.9); 
        }
        #peptopia-blue-book .tab-btn:hover { filter: grayscale(0%) opacity(1); transform: translateY(-1px); }
        #peptopia-blue-book .tab-btn.active { 
            filter: grayscale(0%) opacity(1); 
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); 
            transform: translateY(1px);
        }

        #peptopia-blue-book #tab-cardio { background-color: var(--rose-500); }
        #peptopia-blue-book #tab-resp { background-color: var(--blue-500); }
        #peptopia-blue-book #tab-neuro { background-color: var(--purple-500); }
        #peptopia-blue-book #tab-gi { background-color: var(--emerald-500); }

        /* Layout */
        #peptopia-blue-book .grid-layout { display: flex; flex-direction: column; gap: 2rem; } 
        
        /* Card Headers */
        #peptopia-blue-book .card-header {
            padding: 0.4rem 1rem; min-height: 35px;
            color: #fff; display: flex; justify-content: space-between; align-items: center;
            border-radius: 0.5rem 0.5rem 0 0;
            font-size: 0.95rem; font-weight: 700; letter-spacing: 0.5px;
        }

        /* Tables */
        #peptopia-blue-book .table-container { 
            overflow-x: auto; border: 2px solid; border-radius: 0 0 0.5rem 0.5rem; background: var(--bg-panel); 
            max-height: 600px; overflow-y: auto; 
        }
        #peptopia-blue-book table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem; }
        #peptopia-blue-book th { padding: 0.75rem; background-color: var(--slate-100); color: var(--slate-900); border-bottom: 2px solid var(--slate-200); position: sticky; top: 0; z-index: 10; }
        #peptopia-blue-book td { padding: 0.75rem; border-bottom: 1px solid var(--slate-200); vertical-align: top; }
        #peptopia-blue-book tr:hover td { cursor: pointer; filter: brightness(95%); }
        #peptopia-blue-book tr.selected td { border-left: 5px solid var(--accent-gold); background-color: #e0e7ff; }

        /* Specific Colors */
        #peptopia-blue-book .bg-rose { background-color: var(--rose-500) !important; }
        #peptopia-blue-book .border-rose { border-color: var(--rose-500) !important; }
        #peptopia-blue-book .bg-blue { background-color: var(--blue-500) !important; }
        #peptopia-blue-book .border-blue { border-color: var(--blue-500) !important; }
        #peptopia-blue-book .bg-purple { background-color: var(--purple-500) !important; }
        #peptopia-blue-book .border-purple { border-color: var(--purple-500) !important; }
        #peptopia-blue-book .bg-emerald { background-color: var(--emerald-500) !important; }
        #peptopia-blue-book .border-emerald { border-color: var(--emerald-500) !important; }

        #peptopia-blue-book .topic-cell { font-weight: 800; white-space: nowrap; width: 1%; color: var(--slate-900); }
        #peptopia-blue-book .topic-cell.cardio { background-color: var(--rose-50); }
        #peptopia-blue-book .topic-cell.resp { background-color: var(--blue-50); }
        #peptopia-blue-book .topic-cell.neuro { background-color: var(--purple-50); }
        #peptopia-blue-book .topic-cell.gi { background-color: var(--emerald-50); }

        #peptopia-blue-book .key-point-cell { color: var(--slate-700); font-style: italic; }
        #peptopia-blue-book .key-term { color: var(--key-purple); font-weight: 600; font-style: italic; }
        
        #peptopia-blue-book .alert-cell { color: var(--alert-text); background-color: var(--alert-bg); border-left: 3px solid var(--alert-border); }
        #peptopia-blue-book .alert-cell strong { color: #be123c; font-weight: 800; }
        #peptopia-blue-book .drug-name { color: var(--drug-blue); font-weight: 800; }

        /* Visuals */
        #peptopia-blue-book .visual-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 1.5rem; background-color: var(--bg-panel); border: 1px solid var(--slate-200);
            border-radius: 0.5rem; min-height: 250px; max-width: 600px; margin: 0 auto;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        #peptopia-blue-book .visual-svg-wrapper {
            width: 100%; height: 220px; display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        /* Print */
        @media print {
            body { background: #fff; color: #000; }
            #peptopia-blue-book .navbar, #peptopia-blue-book .tabs-container { display: none; }
            #peptopia-blue-book .grid-layout { display: block; }
            #peptopia-blue-book .table-container { max-height: none; overflow: visible; }
            #peptopia-blue-book { background-color: #fff; }
        }
    </style>

    <nav class="navbar">
        <div class="nav-title">
            <span>📘</span> Blue Book
        </div>
        <div class="nav-actions">
            <button class="action-btn print-btn" onclick="window.print()">Print Guide</button>
        </div>
    </nav>

    <div class="tabs-container">
        <button class="tab-btn bg-rose" id="tab-cardio" onclick="switchTab('cardio')">Cardiovascular</button>
        <button class="tab-btn bg-blue" id="tab-resp" onclick="switchTab('resp')">Respiratory</button>
        <button class="tab-btn bg-purple" id="tab-neuro" onclick="switchTab('neuro')">Neurological</button>
        <button class="tab-btn bg-emerald" id="tab-gi" onclick="switchTab('gi')">GI & Renal</button>
    </div>

    <div id="content-area"></div>

                    { t: 'TB Teaching', f: 'Avoid Alcohol (Hepatotoxicity).', a: '<strong>Non-contagious:</strong> After 3 negative sputum cultures.' },

            },
            neuro: {

                    { t: 'MG Test', f: 'Tensilon Test.', a: '<strong>Positive:</strong> Improvement in muscle strength.' },
                    { t: 'MG Medications', f: 'Anticholinesterases (-stigmine).', a: '<strong>Timing:</strong> Must be given exactly on time (with food).' },
                    { t: 'Multiple Sclerosis', f: 'Demyelination of CNS. Remissions/Exacerbations.', a: '<strong>Signs:</strong> Charcot\'s Triad (Tremor, Scanning speech, Nystagmus).' },
                    { t: 'MS Treatment', f: 'ACTH / Prednisone for acute exacerbations.', a: '<strong>Spasms:</strong> Treated with Baclofen or Dantrium.' },
                    { t: 'Parkinson\'s', f: '<span class="key-term">Dopamine deficiency</span> in Basal ganglia.', a: '<strong>Signs:</strong> Tremor (pill-rolling), Rigidity (Cogwheel), Bradykinesia.' },
                    { t: 'Parkinson\'s Meds', f: '<span class="drug-name">Levodopa/Carbidopa</span> (Sinemet).', a: '<strong>Action:</strong> Increases Dopamine. Avoid B6.' },
                    { t: 'Glasgow Coma Scale', f: 'Eye, Verbal, Motor.', a: '<strong>Max:</strong> 15. <strong>Coma:</strong> < 8.' },
                    { t: 'Head Injury', f: 'Epidural vs Subdural Hematoma.', a: '<strong>Epidural:</strong> Arterial (fast). <strong>Subdural:</strong> Venous (slow).' },

                    { t: 'Glaucoma', f: 'Increased IOP. Tunnel vision.', a: '<strong>Avoid:</strong> Mydriatics (dilate pupil).' },
                    { t: 'Cataracts', f: 'Opacity of lens. Blurry vision.', a: '<strong>Post-op:</strong> No straining/bending (increases IOP).' },
                    { t: 'Retinal Detachment', f: 'Separation of retina.', a: '<strong>Signs:</strong> Flashes of light, Curtain falling.' },
                    { t: 'Hearing Aids', f: 'Amplifies sound (does not clarify).', a: '<strong>Whistling:</strong> Loose earmold or low battery.' }
                ]
            },
            gi: {
                title: 'GI & Renal System', color: 'bg-emerald', border: 'border-emerald', type: 'gi',
                description: 'Exhaustive GI and Renal notes covering Failure, Surgeries, Diets, and Digestive disorders.',

                    { t: 'Acute Glomerulonephritis', f: 'Inflammation of glomeruli. Cause: <span class="key-term">Group A Strep</span>.', a: '<strong>Signs:</strong> Puffiness of face, dark urine, Hematuria.' },

                    { t: 'Hemodialysis Syndrome', f: 'Disequilibrium Syndrome.', a: '<strong>Signs:</strong> Change in LOC, N/V, Headache, Twitching.' },
                    { t: 'Peritoneal Dialysis', f: 'Abdomen punctured, Dialysate infused by gravity.', a: '<strong>Color:</strong> Dialysate should be Straw-colored (clear).' },
                    { t: 'Peritoneal Dialysis: Issues', f: 'Cloudy drainage means <span class="key-term">Peritonitis</span>.', a: '<strong>Dyspnea:</strong> If SOB occurs, slow flow and elevate HOB.' },

        let currentTab = 'cardio';
        let currentItem = contentData.cardio.data[0];

        function renderVisual(key) {
            const style = 'height:200px; width:auto; display:block; margin:0 auto;';
            
            if(key.includes('MI') || key.includes('Angina')) {
                return `<svg viewBox="0 0 100 100" style="${style}"><path d="M50 30 C 20 10, 10 50, 50 90 C 90 50, 80 10, 50 30" fill="#ffe4e6" stroke="#f43f5e" stroke-width="2"/><path d="M55 35 Q 65 45 60 60" stroke="#7f1d1d" stroke-width="3" fill="none"/><circle cx="60" cy="50" r="4" fill="#000"/><text x="70" y="50" font-size="6" fill="#7f1d1d" font-weight="bold">Blockage</text></svg>`;
            }
            if(key.includes('Aneurysm')) {
                return `<svg viewBox="0 0 100 100" style="${style}"><path d="M40 20 L40 40 C 20 50, 20 70, 40 80 L40 90 M60 20 L60 40 C 80 50, 80 70, 60 80 L60 90" fill="#fff1f2" stroke="#f43f5e" stroke-width="2"/><text x="50" y="60" font-size="6" text-anchor="middle" fill="#be123c" font-weight="bold">Weakened Wall</text></svg>`;
            }
            if(key.includes('Emphysema') || key.includes('COPD')) {
                return `<svg viewBox="0 0 100 100" style="${style}"><circle cx="40" cy="40" r="15" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><circle cx="60" cy="40" r="15" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><circle cx="50" cy="60" r="20" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><text x="50" y="50" font-size="6" text-anchor="middle" fill="#0891b2" font-weight="bold">Trapped Air</text></svg>`;
            }
            if(key.includes('RDS')) {
                return `<svg viewBox="0 0 100 100" style="${style}"><circle cx="50" cy="50" r="30" fill="#f8fafc" stroke="#06b6d4" stroke-width="2" stroke-dasharray="4,2"/><text x="50" y="50" font-size="6" text-anchor="middle" fill="#0891b2" font-weight="bold">Needs Surfactant</text></svg>`;
            }
            if(key.includes('ICP') || key.includes('Neuro') || key.includes('Stroke') || key.includes('CVA')) {
                return `<svg viewBox="0 0 100 100" style="${style}"><path d="M30 40 Q 50 10 70 40 Q 90 50 70 80 Q 50 90 30 80 Q 10 50 30 40" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/><circle cx="60" cy="60" r="10" fill="#ef4444" opacity="0.6"/><text x="50" y="50" font-size="6" text-anchor="middle" fill="#6d28d9" font-weight="bold">Brain / Pressure</text></svg>`;
            }
            if(key.includes('Spinal') || key.includes('Laminectomy')) {
                return `<svg viewBox="0 0 100 100" style="${style}"><rect x="45" y="20" width="10" height="60" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/><line x1="35" y1="40" x2="65" y2="40" stroke="#8b5cf6" stroke-width="2"/><line x1="35" y1="60" x2="65" y2="60" stroke="#8b5cf6" stroke-width="2"/><text x="50" y="90" font-size="6" text-anchor="middle" fill="#6d28d9" font-weight="bold">Spinal Column</text></svg>`;
            }
            if(key.includes('Appendicitis')) {
                return `<svg viewBox="0 0 100 100" style="${style}"><path d="M30 20 L30 80 L80 80 L80 20 Z" fill="none" stroke="#ccc"/><circle cx="70" cy="70" r="5" fill="#ef4444"/><text x="55" y="60" font-size="6" fill="#ef4444" font-weight="bold">McBurney's</text></svg>`;
            }
            if(key.includes('Pyloric') || key.includes('Stomach') || key.includes('Ulcer')) {
                return `<svg viewBox="0 0 100 100" style="${style}"><path d="M30 40 Q 60 20 80 50 Q 70 90 40 80 Q 20 60 30 40" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/><ellipse cx="75" cy="50" rx="5" ry="8" fill="#047857"/><text x="75" y="70" font-size="6" text-anchor="middle" fill="#047857" font-weight="bold">Olive Mass</text></svg>`;
            }
            if(key.includes('Kidney') || key.includes('Renal') || key.includes('Pyelonephritis')) {
                return `<svg viewBox="0 0 100 100" style="${style}"><path d="M30 30 Q 80 30 80 60 Q 80 90 50 80 Q 20 60 30 30" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/><path d="M35 45 Q 45 45 45 55 Q 45 65 35 65" fill="none" stroke="#047857" stroke-width="2"/><text x="50" y="95" font-size="6" text-anchor="middle" fill="#047857" font-weight="bold">Kidney</text></svg>`;
            }
            if(key.includes('Colostomy')) {
                return `<svg viewBox="0 0 100 100" style="${style}"><path d="M20 80 L20 30 L80 30 L80 80" fill="none" stroke="#10b981" stroke-width="15" stroke-linecap="round"/><circle cx="80" cy="50" r="8" fill="#ef4444"/><text x="50" y="60" font-size="6" text-anchor="middle" fill="#047857" font-weight="bold">Descending Stoma</text></svg>`;
            }

            return `<svg viewBox="0 0 100 100" style="${style}"><circle cx="50" cy="50" r="40" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="50" y="50" font-size="8" text-anchor="middle" fill="#94a3b8">Visual Reference</text></svg>`;
        }

        window.switchTab = function(tabName) {
            currentTab = tabName;
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-rose', 'bg-blue', 'bg-purple', 'bg-emerald');
                if(btn.id === 'tab-cardio') btn.classList.add('bg-rose'); 
            });
            
            const activeBtn = document.getElementById(`tab-${tabName}`);
            activeBtn.classList.add('active');
            
            if(tabName === 'cardio') activeBtn.classList.add('bg-rose');
            if(tabName === 'resp') activeBtn.classList.add('bg-blue');
            if(tabName === 'neuro') activeBtn.classList.add('bg-purple');
            if(tabName === 'gi') activeBtn.classList.add('bg-emerald');

            currentItem = contentData[tabName].data[0];
            renderGuide();
        }

        function renderGuide() {
            const container = document.getElementById('content-area');
            const data = contentData[currentTab];

            const rows = data.data.map((item, idx) => `
                <tr onclick="selectItem(${idx})" class="${currentItem.t === item.t ? 'selected ' + data.type : ''}">
                    <td class="topic-cell ${data.type}">${item.t}</td>
                    <td class="key-point-cell">${item.f}</td>
                    <td class="alert-cell ${data.type}">${item.a}</td>
                </tr>
            `).join('');

            const visualHTML = renderVisual(currentItem.t);

            const content = `
                <div class="card-header ${data.color}">
                    <h2 style="margin:0;">${data.title}</h2>
                    <span style="font-size:0.8rem; font-weight:normal; opacity:0.9;">${data.data.length} Items</span>
                </div>
                <div class="grid-layout">
                    <div>
                        <div style="margin-bottom:1rem; padding:0.5rem; background:var(--bg-panel); border:1px solid #e2e8f0; border-radius:0.25rem;">${data.description}</div>
                        <div class="table-container ${data.border}">
                            <table>
                                <thead><tr><th>Topic</th><th>Clinical Fact</th><th>Nursing Priority / Alerts</th></tr></thead>
                                <tbody>${rows}</tbody>
                            </table>
                        </div>
                    </div>
                    <div>
                        <div class="visual-container">
                            <h3 style="margin:0 0 1rem 0; color:#334155; font-size:1rem;">Visual Reference</h3>
                            <div class="visual-svg-wrapper">${visualHTML}</div>
                            <p style="margin-top:1rem; font-weight:700; text-align:center; font-size:1.1rem; color:#0f172a;">${currentItem.t}</p>
                        </div>
                    </div>
                </div>
            `;
            container.innerHTML = content;
        }

        window.selectItem = function(idx) {
            currentItem = contentData[currentTab].data[idx];
            renderGuide();
        }

        if(document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', () => switchTab('cardio')); } 
        else { switchTab('cardio'); }
    })();
    </script>
</div>

</body>
</html>
